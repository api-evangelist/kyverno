naftiko: 1.0.0-alpha2
info:
  label: Kyverno Policy Reporter API — Health
  description: 'Kyverno Policy Reporter API — Health. 1 operations. Lead operation: Kyverno Health check. Self-contained Naftiko
    capability covering one Kyverno business surface.'
  tags:
  - Kyverno
  - Health
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KYVERNO_API_KEY: KYVERNO_API_KEY
capability:
  consumes:
  - type: http
    namespace: policy-reporter-health
    baseUri: http://localhost:8080
    description: Kyverno Policy Reporter API — Health business capability. Self-contained, no shared references.
    resources:
    - name: healthz
      path: /healthz
      operations:
      - name: gethealthz
        method: GET
        description: Kyverno Health check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: policy-reporter-health-rest
    port: 8080
    description: REST adapter for Kyverno Policy Reporter API — Health. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/healthz
      name: healthz
      description: REST surface for healthz.
      operations:
      - method: GET
        name: gethealthz
        description: Kyverno Health check
        call: policy-reporter-health.gethealthz
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: policy-reporter-health-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kyverno Policy Reporter API — Health. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: kyverno-health-check
      description: Kyverno Health check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: policy-reporter-health.gethealthz
      outputParameters:
      - type: object
        mapping: $.
