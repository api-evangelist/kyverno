naftiko: 1.0.0-alpha2
info:
  label: Kyverno Policy Reporter API — Namespaces
  description: 'Kyverno Policy Reporter API — Namespaces. 1 operations. Lead operation: Kyverno List namespaces with policy
    reports. Self-contained Naftiko capability covering one Kyverno business surface.'
  tags:
  - Kyverno
  - Namespaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KYVERNO_API_KEY: KYVERNO_API_KEY
capability:
  consumes:
  - type: http
    namespace: policy-reporter-namespaces
    baseUri: http://localhost:8080
    description: Kyverno Policy Reporter API — Namespaces business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-namespaces
      path: /api/v1/namespaces
      operations:
      - name: listnamespaces
        method: GET
        description: Kyverno List namespaces with policy reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: policy-reporter-namespaces-rest
    port: 8080
    description: REST adapter for Kyverno Policy Reporter API — Namespaces. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/namespaces
      name: api-v1-namespaces
      description: REST surface for api-v1-namespaces.
      operations:
      - method: GET
        name: listnamespaces
        description: Kyverno List namespaces with policy reports
        call: policy-reporter-namespaces.listnamespaces
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: policy-reporter-namespaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kyverno Policy Reporter API — Namespaces. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: kyverno-list-namespaces-policy-reports
      description: Kyverno List namespaces with policy reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: policy-reporter-namespaces.listnamespaces
      outputParameters:
      - type: object
        mapping: $.
